# Production profile - used when deployed on Render
server.port=${PORT:8080}

# Use file-based H2 so data persists across restarts (optional: swap for PostgreSQL)
spring.datasource.url=jdbc:h2:file:./financedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

logging.level.com.finance=WARN
